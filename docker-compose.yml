services:
  mysql:
    image: mysql:8.4
    container_name: task_mysql
    restart: none
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongo:
    image: mongo:7
    container_name: task_mongo
    restart: none
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: task_api
    restart: none
    depends_on:
      - mysql
      - mongo
    env_file:
      - .env
    ports:
      - "3000:3000"

volumes:
  mysql_data:
  mongo_data: